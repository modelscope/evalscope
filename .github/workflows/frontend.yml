name: Frontend checks

on:
  pull_request:
    paths:
      - 'evalscope/web/**'
      - 'DESIGN.md'
      - '.github/workflows/frontend.yml'
  push:
    branches:
      - main
    paths:
      - 'evalscope/web/**'
      - 'DESIGN.md'
      - '.github/workflows/frontend.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evalscope/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: evalscope/web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run drift
      - run: npm run build
