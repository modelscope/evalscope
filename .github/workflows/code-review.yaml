name: Qoder Auto Code Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  qoder-review-trusted:
    if: contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          # Opt in to fork checkout under pull_request_target. Trusted authors
          # (OWNER/MEMBER/COLLABORATOR) gate this job, so the risk is bounded.
          allow-unsafe-pr-checkout: true

      - name: Run Qoder Code Review
        uses: QoderAI/qoder-action@v0
        with:
          qoder_personal_access_token: ${{ secrets.QODER_PERSONAL_ACCESS_TOKEN }}
          prompt: |
            /review-pr
            REPO:${{ github.repository }} PR_NUMBER:${{ github.event.pull_request.number }}

  qoder-review-external:
    if: ${{ !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) }}
    runs-on: ubuntu-latest
    environment: qoder-review
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          # Fork code checkout is intentionally opted in here. This is only safe
          # because the qoder-review environment gates this job behind required
          # reviewers, so a maintainer approves the PR before untrusted code runs.
          allow-unsafe-pr-checkout: true

      - name: Run Qoder Code Review
        uses: QoderAI/qoder-action@v0
        with:
          qoder_personal_access_token: ${{ secrets.QODER_PERSONAL_ACCESS_TOKEN }}
          prompt: |
            /review-pr
            REPO:${{ github.repository }} PR_NUMBER:${{ github.event.pull_request.number }}
